name: terraform-plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - "app/contracts/**"
      - ".github/workflows/terraform-*.yml"

permissions:
  contents: read
  id-token: write

jobs:
  plan-dev:
    runs-on: ubuntu-latest
    environment: dev
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_IN_AUTOMATION: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Resolve Terraform backend (dev)
        id: tfstate_dev
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.TFSTATE_RESOURCE_GROUP || secrets.TFSTATE_RESOURCE_GROUP || 'rg-tfstate' }}"
          CONTAINER="${{ vars.TFSTATE_CONTAINER || secrets.TFSTATE_CONTAINER || 'tfstate' }}"
          SA="${{ vars.TFSTATE_STORAGE_ACCOUNT || secrets.TFSTATE_STORAGE_ACCOUNT }}"
          if [[ -z "${SA}" ]]; then
            SA="$(az storage account list -g "${RG}" --query "[?tags.purpose=='terraform-state'].name | [0]" -o tsv)"
          fi
          if [[ -z "${SA}" ]]; then
            echo "Could not resolve TFSTATE storage account in resource group ${RG}." >&2
            exit 1
          fi
          echo "rg=${RG}" >> "$GITHUB_OUTPUT"
          echo "container=${CONTAINER}" >> "$GITHUB_OUTPUT"
          echo "storage_account=${SA}" >> "$GITHUB_OUTPUT"

      - name: Terraform fmt (check)
        working-directory: infra/terraform/envs/dev
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: infra/terraform/envs/dev
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ steps.tfstate_dev.outputs.rg }}" \
            -backend-config="storage_account_name=${{ steps.tfstate_dev.outputs.storage_account }}" \
            -backend-config="container_name=${{ steps.tfstate_dev.outputs.container }}" \
            -backend-config="use_azuread_auth=true"

      - name: Terraform validate
        working-directory: infra/terraform/envs/dev
        run: terraform validate

      - name: Terraform plan
        working-directory: infra/terraform/envs/dev
        run: terraform plan -out=tfplan

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: infra/terraform/envs/dev/tfplan

