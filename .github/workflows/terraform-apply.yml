name: terraform-apply

on:
  push:
    branches: ["main"]
    paths:
      - "infra/terraform/**"
      - "app/contracts/**"
      - ".github/workflows/terraform-*.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Which environment to apply"
        required: true
        default: "both"
        type: choice
        options:
          - dev
          - prod
          - both
      reset:
        description: "Destroy and recreate selected environment resources"
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  apply-dev:
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.environment == 'dev' || inputs.environment == 'both') }}
    concurrency:
      group: terraform-apply-dev-${{ github.ref }}
      cancel-in-progress: false
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_IN_AUTOMATION: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Resolve Terraform backend (dev)
        id: tfstate_dev
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.TFSTATE_RESOURCE_GROUP || secrets.TFSTATE_RESOURCE_GROUP || 'rg-tfstate' }}"
          CONTAINER="${{ vars.TFSTATE_CONTAINER || secrets.TFSTATE_CONTAINER || 'tfstate' }}"
          SA="${{ vars.TFSTATE_STORAGE_ACCOUNT || secrets.TFSTATE_STORAGE_ACCOUNT }}"
          if [[ -z "${SA}" ]]; then
            SA="$(az storage account list -g "${RG}" --query "[?tags.purpose=='terraform-state'].name | [0]" -o tsv)"
          fi
          if [[ -z "${SA}" ]]; then
            echo "Could not resolve TFSTATE storage account in resource group ${RG}." >&2
            exit 1
          fi
          KEY="$(az storage account keys list -g "${RG}" -n "${SA}" --query "[0].value" -o tsv)"
          if [[ -z "${KEY}" ]]; then
            echo "Could not read access key for storage account ${SA}." >&2
            exit 1
          fi
          echo "::add-mask::${KEY}"
          echo "rg=${RG}" >> "$GITHUB_OUTPUT"
          echo "container=${CONTAINER}" >> "$GITHUB_OUTPUT"
          echo "storage_account=${SA}" >> "$GITHUB_OUTPUT"
          echo "access_key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Hard reset (dev) - delete state blob & resource group
        if: ${{ inputs.reset }}
        shell: bash
        run: |
          set -euo pipefail
          RG="rg-cce-dev"
          ACCOUNT="${{ steps.tfstate_dev.outputs.storage_account }}"
          KEY="${{ steps.tfstate_dev.outputs.access_key }}"
          CONTAINER="${{ steps.tfstate_dev.outputs.container }}"
          BLOB="dev.terraform.tfstate"

          az storage blob lease break \
            --account-name "${ACCOUNT}" \
            --account-key "${KEY}" \
            --container-name "${CONTAINER}" \
            --blob-name "${BLOB}" || true

          az storage blob delete \
            --account-name "${ACCOUNT}" \
            --account-key "${KEY}" \
            --container-name "${CONTAINER}" \
            --name "${BLOB}" || true

          az group delete -n "${RG}" --yes --no-wait || true
          az group wait -n "${RG}" --deleted --timeout 1800 || true

      - name: Terraform init
        working-directory: infra/terraform/envs/dev
        run: |
          cat > backend.hcl <<'EOF'
          resource_group_name  = "${{ steps.tfstate_dev.outputs.rg }}"
          storage_account_name = "${{ steps.tfstate_dev.outputs.storage_account }}"
          container_name       = "${{ steps.tfstate_dev.outputs.container }}"
          access_key           = "${{ steps.tfstate_dev.outputs.access_key }}"
          EOF
          terraform init -backend-config=backend.hcl

      - name: Break stale state lock (dev)
        shell: bash
        run: |
          set -euo pipefail
          ACCOUNT="${{ steps.tfstate_dev.outputs.storage_account }}"
          KEY="${{ steps.tfstate_dev.outputs.access_key }}"
          CONTAINER="${{ steps.tfstate_dev.outputs.container }}"
          BLOB="dev.terraform.tfstate"

          # Attempt to break any stale lease on the state blob, then wait until it's unlocked.
          az storage blob lease break \
            --account-name "${ACCOUNT}" \
            --account-key "${KEY}" \
            --container-name "${CONTAINER}" \
            --blob-name "${BLOB}" || true

          for i in $(seq 1 30); do
            STATUS="$(az storage blob show --account-name "${ACCOUNT}" --account-key "${KEY}" --container-name "${CONTAINER}" --name "${BLOB}" --query "properties.lease.status" -o tsv || true)"
            if [[ "${STATUS}" == "unlocked" || -z "${STATUS}" ]]; then
              exit 0
            fi
            sleep 2
          done
          # Fallback: force-unlock a known stale lock id if it still exists.
          terraform -chdir=infra/terraform/envs/dev force-unlock -force "09f38d6b-b63c-c5ee-215a-29f84dc82e26" || true
          echo "State blob lease is still locked after waiting." >&2
          exit 1

      - name: Terraform apply
        working-directory: infra/terraform/envs/dev
        run: |
          terraform apply -auto-approve -lock-timeout=10m

  deploy-app-dev:
    runs-on: ubuntu-latest
    environment: dev
    needs: [apply-dev]
    if: ${{ needs.apply-dev.result == 'success' && github.event_name == 'workflow_dispatch' && (inputs.environment == 'dev' || inputs.environment == 'both') }}
    concurrency:
      group: deploy-app-dev-${{ github.ref }}
      cancel-in-progress: false
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_IN_AUTOMATION: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Resolve Terraform backend (dev)
        id: tfstate_dev
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.TFSTATE_RESOURCE_GROUP || secrets.TFSTATE_RESOURCE_GROUP || 'rg-tfstate' }}"
          CONTAINER="${{ vars.TFSTATE_CONTAINER || secrets.TFSTATE_CONTAINER || 'tfstate' }}"
          SA="${{ vars.TFSTATE_STORAGE_ACCOUNT || secrets.TFSTATE_STORAGE_ACCOUNT }}"
          if [[ -z "${SA}" ]]; then
            SA="$(az storage account list -g "${RG}" --query "[?tags.purpose=='terraform-state'].name | [0]" -o tsv)"
          fi
          if [[ -z "${SA}" ]]; then
            echo "Could not resolve TFSTATE storage account in resource group ${RG}." >&2
            exit 1
          fi
          KEY="$(az storage account keys list -g "${RG}" -n "${SA}" --query "[0].value" -o tsv)"
          if [[ -z "${KEY}" ]]; then
            echo "Could not read access key for storage account ${SA}." >&2
            exit 1
          fi
          echo "::add-mask::${KEY}"
          echo "rg=${RG}" >> "$GITHUB_OUTPUT"
          echo "container=${CONTAINER}" >> "$GITHUB_OUTPUT"
          echo "storage_account=${SA}" >> "$GITHUB_OUTPUT"
          echo "access_key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Terraform init (dev)
        working-directory: infra/terraform/envs/dev
        run: |
          cat > backend.hcl <<'EOF'
          resource_group_name  = "${{ steps.tfstate_dev.outputs.rg }}"
          storage_account_name = "${{ steps.tfstate_dev.outputs.storage_account }}"
          container_name       = "${{ steps.tfstate_dev.outputs.container }}"
          access_key           = "${{ steps.tfstate_dev.outputs.access_key }}"
          EOF
          terraform init -backend-config=backend.hcl

      - name: Read Terraform outputs (dev)
        id: tfout
        working-directory: infra/terraform/envs/dev
        run: |
          set -euo pipefail
          OUT="$(terraform output -json)"
          RG="$(printf '%s' "$OUT" | jq -r '.resource_group_name.value // empty')"
          FUNC="$(printf '%s' "$OUT" | jq -r '.function_app_name.value // empty')"
          if [[ -z "${RG}" || -z "${FUNC}" ]]; then
            echo "Terraform outputs not found yet for dev." >&2
            exit 1
          fi
          echo "resource_group=${RG}" >> "$GITHUB_OUTPUT"
          echo "function_app=${FUNC}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: app/functions
        run: npm install --omit=dev

      - name: Build deployment package
        working-directory: app/functions
        run: |
          zip -r ../functionapp.zip . \
            -x "**/.git/**" \
            -x "**/local.settings.json"

      - name: Zip deploy to Function App
        run: |
          az functionapp deployment source config-zip \
            --resource-group "${{ steps.tfout.outputs.resource_group }}" \
            --name "${{ steps.tfout.outputs.function_app }}" \
            --src "app/functionapp.zip"

  apply-prod:
    runs-on: ubuntu-latest
    environment: prod
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.environment == 'prod' || inputs.environment == 'both' }}
    concurrency:
      group: terraform-apply-prod-${{ github.ref }}
      cancel-in-progress: false
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_IN_AUTOMATION: "true"
    steps:
      - uses: actions/checkout@v5

      - name: Azure login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Resolve Terraform backend (prod)
        id: tfstate_prod
        shell: bash
        run: |
          set -euo pipefail
          RG="${{ vars.TFSTATE_RESOURCE_GROUP || secrets.TFSTATE_RESOURCE_GROUP || 'rg-tfstate' }}"
          CONTAINER="${{ vars.TFSTATE_CONTAINER || secrets.TFSTATE_CONTAINER || 'tfstate' }}"
          SA="${{ vars.TFSTATE_STORAGE_ACCOUNT || secrets.TFSTATE_STORAGE_ACCOUNT }}"
          if [[ -z "${SA}" ]]; then
            SA="$(az storage account list -g "${RG}" --query "[?tags.purpose=='terraform-state'].name | [0]" -o tsv)"
          fi
          if [[ -z "${SA}" ]]; then
            echo "Could not resolve TFSTATE storage account in resource group ${RG}." >&2
            exit 1
          fi
          KEY="$(az storage account keys list -g "${RG}" -n "${SA}" --query "[0].value" -o tsv)"
          if [[ -z "${KEY}" ]]; then
            echo "Could not read access key for storage account ${SA}." >&2
            exit 1
          fi
          echo "::add-mask::${KEY}"
          echo "rg=${RG}" >> "$GITHUB_OUTPUT"
          echo "container=${CONTAINER}" >> "$GITHUB_OUTPUT"
          echo "storage_account=${SA}" >> "$GITHUB_OUTPUT"
          echo "access_key=${KEY}" >> "$GITHUB_OUTPUT"

      - name: Hard reset (prod) - delete state blob & resource group
        if: ${{ inputs.reset }}
        shell: bash
        run: |
          set -euo pipefail
          RG="rg-cce-prod"
          ACCOUNT="${{ steps.tfstate_prod.outputs.storage_account }}"
          KEY="${{ steps.tfstate_prod.outputs.access_key }}"
          CONTAINER="${{ steps.tfstate_prod.outputs.container }}"
          BLOB="prod.terraform.tfstate"

          az storage blob lease break \
            --account-name "${ACCOUNT}" \
            --account-key "${KEY}" \
            --container-name "${CONTAINER}" \
            --blob-name "${BLOB}" || true

          az storage blob delete \
            --account-name "${ACCOUNT}" \
            --account-key "${KEY}" \
            --container-name "${CONTAINER}" \
            --name "${BLOB}" || true

          az group delete -n "${RG}" --yes --no-wait || true
          az group wait -n "${RG}" --deleted --timeout 1800 || true

      - name: Terraform init
        working-directory: infra/terraform/envs/prod
        run: |
          cat > backend.hcl <<'EOF'
          resource_group_name  = "${{ steps.tfstate_prod.outputs.rg }}"
          storage_account_name = "${{ steps.tfstate_prod.outputs.storage_account }}"
          container_name       = "${{ steps.tfstate_prod.outputs.container }}"
          access_key           = "${{ steps.tfstate_prod.outputs.access_key }}"
          EOF
          terraform init -backend-config=backend.hcl

      - name: Break stale state lock (prod)
        shell: bash
        run: |
          set -euo pipefail
          az storage blob lease break \
            --account-name "${{ steps.tfstate_prod.outputs.storage_account }}" \
            --account-key "${{ steps.tfstate_prod.outputs.access_key }}" \
            --container-name "${{ steps.tfstate_prod.outputs.container }}" \
            --blob-name "prod.terraform.tfstate" \
            || true

          terraform -chdir=infra/terraform/envs/prod force-unlock -force "09f38d6b-b63c-c5ee-215a-29f84dc82e26" || true

      - name: Terraform apply
        working-directory: infra/terraform/envs/prod
        run: |
          terraform apply -auto-approve -lock-timeout=10m

